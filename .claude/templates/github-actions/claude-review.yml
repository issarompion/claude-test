# Claude Code Action - Automatic PR review
# Source: https://github.com/anthropics/claude-code-action
#
# Prerequisites: an Anthropic API key (pay-per-use). The Max plan (OAuth) does not
#   work in CI because it requires interactive authentication.
#   Alternatives: Amazon Bedrock, Google Vertex AI, or Microsoft Foundry.
#
# Setup:
#   1. Add ANTHROPIC_API_KEY in Settings > Secrets > Actions
#   2. Copy this file to .github/workflows/claude-review.yml
#   3. (Optional) Run `/install-github-app` in Claude Code for full setup
#
# Usage:
#   - Automatic review on every PR opened/updated
#   - Mention @claude in a PR comment to ask questions
#   - Mention @claude in an issue to request an implementation

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  # Automatic PR review
  auto-review:
    if: >
      github.event_name == 'pull_request' &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request:

            ## Code Quality
            - [ ] Code follows project conventions
            - [ ] No commented-out code or debug statements
            - [ ] DRY principle followed

            ## Testing
            - [ ] Tests present for new code
            - [ ] Edge cases covered

            ## Security
            - [ ] No hardcoded credentials or secrets
            - [ ] Input validation where needed
            - [ ] No sensitive data in logs

            ## Documentation
            - [ ] CHANGELOG updated if needed
            - [ ] Commit messages follow Conventional Commits

            Post a summary comment with checklist results.
            Use inline comments for specific code issues.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  # Respond to @claude mentions in PRs and issues
  claude-mention:
    if: >
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE/PR NUMBER: ${{ github.event.issue.number }}
            COMMENT BY: ${{ github.event.comment.user.login }}

            Respond to this comment:
            ${{ github.event.comment.body }}

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh issue comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh issue view:*),Read,Glob,Grep"
