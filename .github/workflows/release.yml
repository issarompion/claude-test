name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bats
        uses: bats-core/bats-action@4.0.0

      - name: Run tests
        run: ./scripts/test.sh

      - name: Validate
        run: |
          chmod +x scripts/*.sh
          ./scripts/validate.sh . || true

      - name: Read version and counts
        id: meta
        run: |
          echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
          echo "commands=$(find .claude/commands -name '*.md' -not -name 'README.md' | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "agents=$(find .claude/agents -name '*.md' -not -name 'README.md' | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "skills=$(find .claude/skills -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "rules=$(find .claude/rules -name '*.md' -not -name 'README.md' | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "styles=$(find .claude/output-styles -name '*.md' -not -name 'README.md' | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          # Tag is vX.Y.Z; CHANGELOG.md heading is "## [X.Y.Z] - DATE".
          VERSION="${GITHUB_REF_NAME#v}"

          # Print every line between "## [VERSION]" (exclusive) and the
          # next "## [" heading (exclusive). Empty when VERSION is missing.
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/{
              if (capture) exit
              if ($0 ~ "^## \\[" ver "\\]") { capture=1; next }
            }
            capture { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "::warning::No CHANGELOG.md section found for v$VERSION — using fallback body"
            NOTES="Release v$VERSION. See [CHANGELOG.md](./CHANGELOG.md) for details."
          fi

          # Multi-line step output (GitHub Actions heredoc syntax).
          {
            echo "body<<RELNOTES_EOF"
            echo "$NOTES"
            echo "RELNOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compute checksums
        run: |
          # Checksums are computed on the tagged commit, so they can never
          # drift from what the release actually ships. install.sh is the one
          # entry point users pipe into a shell — publishing its sha256 lets
          # them verify-before-execute (see .claude/rules/security.md).
          git archive --format=tar.gz \
            --prefix="claude-base-${GITHUB_REF_NAME}/" \
            -o "claude-base-${GITHUB_REF_NAME}.tar.gz" HEAD
          sha256sum install.sh "claude-base-${GITHUB_REF_NAME}.tar.gz" > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            SHA256SUMS
            claude-base-*.tar.gz
          body: |
            ${{ steps.notes.outputs.body }}

            ## Installation

            **Pinned + verified** (recommended) — fetch the tagged installer,
            check it against the published `SHA256SUMS`, then run it:

            ```bash
            TAG=${{ github.ref_name }}
            curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/$TAG/install.sh" -o install.sh
            curl -fsSL "https://github.com/${{ github.repository }}/releases/download/$TAG/SHA256SUMS" -o SHA256SUMS
            sha256sum --check --ignore-missing SHA256SUMS   # install.sh: OK
            bash install.sh --ref "$TAG"
            ```

            **Quick** (latest `main`, unverified):

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            ## Contents of this release

            - ${{ steps.meta.outputs.commands }} Commands
            - ${{ steps.meta.outputs.agents }} Sub-Agents with isolated context
            - ${{ steps.meta.outputs.skills }} Skills with automatic triggering
            - ${{ steps.meta.outputs.rules }} Modular Rules per language
            - ${{ steps.meta.outputs.styles }} Output Styles
            - 4 Guides per domain (Web, Mobile, API, Data)
            - Interactive Setup Wizard
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
