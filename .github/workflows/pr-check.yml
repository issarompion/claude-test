name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-progress runs for the same PR
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Least-privilege default for the GITHUB_TOKEN
permissions:
  contents: read
  pull-requests: read

jobs:
  pr-validation:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            revert
            hotfix
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The title must start with a lowercase letter.
            Example: "feat: add user authentication"

      - name: Check commit messages
        uses: wagoid/commitlint-github-action@v6
        continue-on-error: true

      - name: Check for WIP
        run: |
          if [[ "${{ github.event.pull_request.title }}" == *"WIP"* ]]; then
            echo "::warning::This PR is marked as WIP"
            exit 1
          fi

      - name: Check PR size
        uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/XS'
          xs_max_size: 10
          s_label: 'size/S'
          s_max_size: 100
          m_label: 'size/M'
          m_max_size: 500
          l_label: 'size/L'
          l_max_size: 1000
          xl_label: 'size/XL'
          fail_if_xl: false
          message_if_xl: |
            This PR is very large. Consider splitting it into smaller PRs.
