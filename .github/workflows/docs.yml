name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.claude/**'
      - '.github/workflows/docs.yml'
  # Build (but do not deploy) on PRs touching docs sources, so broken-link
  # rot is caught at review time instead of only after merge on main.
  pull_request:
    paths:
      - 'website/**'
      - '.claude/**'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress runs
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package.json

      - name: Install dependencies
        # website/package-lock.json is gitignored (build-time docs tree, never
        # shipped) — use npm install, not npm ci.
        run: npm install
        working-directory: website

      - name: Generate documentation from sources
        run: npm run generate
        working-directory: website

      - name: Build documentation
        run: npm run build
        working-directory: website
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    # Never deploy from a PR — the build job above is the PR-time check.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
